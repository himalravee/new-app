<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexaPCB | Global IoT Control</title>
    <style>
        :root { --orange: #F47920; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; text-align: center; padding: 40px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; border-top: 5px solid var(--orange); display: inline-block; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: var(--orange); color: white; border: none; padding: 20px; cursor: pointer; font-weight: bold; border-radius: 10px; width: 100%; font-size: 18px; margin-top: 20px; }
        .btn:active { transform: scale(0.98); }
        #log { font-family: monospace; font-size: 12px; color: #0f0; margin-top: 20px; text-align: left; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--orange)">NexaPCB CLOUD</h2>
        <div style="font-size: 60px; margin: 20px;">💡</div>
        <button class="btn" onclick="sendGlobalCommand('On')">TURN ON</button>
        <button class="btn" style="background:#444;" onclick="sendGlobalCommand('Off')">TURN OFF</button>
        <div id="log">System Ready...</div>
    </div>

    <script>
        // CONFIGURATION FROM YOUR SINRIC CREDENTIALS TAB
        const APP_KEY = "94223934-3419-4c7c-ad06-f38cbffdfb08";
        const DEVICE_ID = "67fbd683bddfc53e33d5a6b6"; // From your log

        async function sendGlobalCommand(state) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = `[${new Date().toLocaleTimeString()}] Sending ${state}...`;

            // We use a CORS proxy to bypass browser security
            const proxy = "https://corsproxy.io/?"; 
            const url = `${proxy}https://api.sinric.pro/v2/action`;

            const payload = {
                action: "setPowerState",
                deviceId: DEVICE_ID,
                value: { state: state }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'x-sinricpro-appkey': APP_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    logDiv.innerHTML += `<br>✓ SUCCESS: Cloud accepted command.`;
                } else {
                    logDiv.innerHTML += `<br>✗ FAILED: Status ${response.status}`;
                }
            } catch (err) {
                logDiv.innerHTML += `<br>✗ ERROR: Check Internet Connection.`;
            }
        }
    </script>
</body>
</html>
