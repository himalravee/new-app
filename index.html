<!DOCTYPE html>
<html>
<head>
    <title>Light Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; display: inline-block; border: 1px solid #333; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; color: white; transition: 0.3s; width: 220px; font-weight: bold; }
        .on { background: #2ecc71; box-shadow: 0 0 15px rgba(46,204,113,0.4); }
        .off { background: #e74c3c; box-shadow: 0 0 15px rgba(231,76,60,0.4); }
        .btn:disabled { background: #555; cursor: wait; }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
        #log { margin-top: 15px; color: #555; font-size: 11px; max-height: 80px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #00e5ff;">Light Control</h2>
        <p style="color:#888; font-size:13px;">Controls via Sinric Pro</p>
        <button id="mainBtn" class="btn off" onclick="sendCmd()">TURN ON</button>
        <div id="status">Ready</div>
        <div id="log"></div>
    </div>
    <script>
        var deviceState = false;
        var API_KEY = '4c449d7e-a7b5-4d27-960e-b6e16b5e0aa1';
        var DEVICE_ID = '67fbd683bddfc53e33d5a6b6';
        var SINRIC_URL = 'https://api.sinric.pro/api/v1/devices/' + DEVICE_ID + '/action';
        var PROXY = 'https://corsproxy.io/?' + encodeURIComponent(SINRIC_URL);

        function addLog(msg) {
            var log = document.getElementById('log');
            log.innerText = msg;
            console.log(msg);
        }

        // Try 4 different payload formats
        var payloads = [
            // Format 1 - standard
            function(state) {
                return { type: 'request', action: 'setPowerState', value: { state: state } };
            },
            // Format 2 - no type
            function(state) {
                return { action: 'setPowerState', value: { state: state } };
            },
            // Format 3 - value as string
            function(state) {
                return { type: 'request', action: 'setPowerState', value: state };
            },
            // Format 4 - minimal
            function(state) {
                return { action: 'setPowerState', state: state };
            }
        ];

        var currentFormat = 0;

        function tryFormat(formatIndex, nextState) {
            if (formatIndex >= payloads.length) {
                document.getElementById('status').innerText = 'All formats failed';
                document.getElementById('mainBtn').disabled = false;
                return;
            }

            var payload = payloads[formatIndex](nextState);
            addLog('Trying format ' + (formatIndex+1) + ': ' + JSON.stringify(payload));

            fetch(PROXY, {
                method: 'POST',
                headers: {
                    'x-sinric-api-key': API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(function(r) { return r.json(); })
            .then(function(result) {
                addLog('Format ' + (formatIndex+1) + ' response: ' + JSON.stringify(result));
                var btn = document.getElementById('mainBtn');
                btn.disabled = false;

                if (result.success === true) {
                    currentFormat = formatIndex;
                    deviceState = !deviceState;
                    btn.innerText = 'TURN ' + (deviceState ? 'OFF' : 'ON');
                    btn.className = 'btn ' + (deviceState ? 'on' : 'off');
                    document.getElementById('status').innerText = 'Sent! Check relay...';
                    addLog('SUCCESS with format ' + (formatIndex+1));
                } else {
                    addLog('Format ' + (formatIndex+1) + ' failed, trying next...');
                    tryFormat(formatIndex + 1, nextState);
                }
            })
            .catch(function(err) {
                addLog('Format ' + (formatIndex+1) + ' error: ' + err.message);
                tryFormat(formatIndex + 1, nextState);
            });
        }

        function sendCmd() {
            var btn = document.getElementById('mainBtn');
            var nextState = deviceState ? 'Off' : 'On';
            btn.disabled = true;
            document.getElementById('status').innerText = 'Sending...';
            tryFormat(0, nextState);
        }
    </script>
</body>
</html>
