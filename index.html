<!DOCTYPE html>
<html>
<head>
    <title>Light Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; display: inline-block; border: 1px solid #333; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; color: white; transition: 0.3s; width: 220px; font-weight: bold; }
        .on { background: #2ecc71; box-shadow: 0 0 15px rgba(46,204,113,0.4); }
        .off { background: #e74c3c; box-shadow: 0 0 15px rgba(231,76,60,0.4); }
        .btn:disabled { background: #555; cursor: wait; }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #00e5ff;">Light Control</h2>
        <p style="color:#888; font-size:13px;">Controls via Sinric Pro</p>
        <button id="mainBtn" class="btn off" onclick="sendCmd()">TURN ON</button>
        <div id="status">Ready</div>
    </div>
    <script>
        var deviceState = false;
        var API_KEY = '4c449d7e-a7b5-4d27-960e-b6e16b5e0aa1';
        var DEVICE_ID = '67fbd683bddfc53e33d5a6b6';
        var PROXY = 'https://corsproxy.io/?';
        var SINRIC_URL = 'https://api.sinric.pro/api/v1/devices/' + DEVICE_ID + '/action';

        function sendCmd() {
            var btn = document.getElementById('mainBtn');
            var status = document.getElementById('status');
            var nextState = deviceState ? 'Off' : 'On';
            btn.disabled = true;
            status.innerText = 'Sending...';
            fetch(PROXY + encodeURIComponent(SINRIC_URL), {
                method: 'POST',
                headers: {
                    'x-sinric-api-key': API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    type: 'request',
                    action: 'setPowerState',
                    value: { state: nextState }
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(result) {
                btn.disabled = false;
                if (result.success === true) {
                    deviceState = !deviceState;
                    btn.innerText = 'TURN ' + (deviceState ? 'OFF' : 'ON');
                    btn.className = 'btn ' + (deviceState ? 'on' : 'off');
                    status.innerText = 'Success!';
                } else {
                    status.innerText = 'Sinric Error: ' + JSON.stringify(result);
                }
            })
            .catch(function(err) {
                btn.disabled = false;
                status.innerText = 'Error: ' + err.message;
            });
        }
    </script>
</body>
</html>
