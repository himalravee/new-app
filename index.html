<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPCB Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background: #1a1a1a; color: white; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { padding: 25px 50px; font-size: 22px; cursor: pointer; border-radius: 12px; border: none; color: white; transition: 0.4s; font-weight: bold; width: 250px; }
        .on { background-color: #2ecc71; box-shadow: 0 0 20px #2ecc71; }
        .off { background-color: #e74c3c; box-shadow: 0 0 20px #e74c3c; }
        .status { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Industrial Control</h2>
        <p>Device: Indoor Light</p>
        <button id="ctrlBtn" class="btn off" onclick="toggleDevice()">TURN ON</button>
        <div id="log" class="status">Waiting for action...</div>
    </div>

    <script>
        let isOn = false;
        // Add the proxy prefix before the Sinric URL
const proxyUrl = "https://cors-anywhere.herokuapp.com/";
const sinricUrl = `https://api.sinric.pro/api/v1/devices/${deviceId}/action`;
        
        // PASTE YOUR DETAILS HERE
        const deviceId = "67fbd683bddfc53e33d5a6b6"; // From your screenshot
        const apiKey = "4c449d7e-a7b5-4d27-960e-b6e16b5e0aa1"; 

        async function toggleDevice() {
            const btn = document.getElementById('ctrlBtn');
            const log = document.getElementById('log');
            
            // Disable button during request
            btn.disabled = true;
            log.innerText = "Sending command...";

            const nextState = isOn ? "Off" : "On";
            
            try {
                const response = await fetch(`https://api.sinric.pro/api/v1/devices/${deviceId}/action`, {
                    method: 'POST',
                    headers: {
                        'x-sinric-api-key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "action": "setPowerState",
                        "value": { "state": nextState }
                    })
                });

                if (response.ok) {
                    isOn = !isOn;
                    btn.innerText = `TURN ${isOn ? 'OFF' : 'ON'}`;
                    btn.className = `btn ${isOn ? 'on' : 'off'}`;
                    log.innerText = `Success: Device is now ${nextState}`;
                } else {
                    const errorData = await response.text();
                    log.innerText = "Error: " + response.status;
                    console.error("Sinric Error:", errorData);
                }
            } catch (err) {
                log.innerText = "Network Error - Check Internet";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
