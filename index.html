<!DOCTYPE html>
<html>
<head>
    <title>NexaPCB Industrial Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; padding: 50px; }
        .btn { padding: 30px; width: 200px; font-size: 24px; cursor: pointer; border-radius: 15px; border: none; transition: 0.3s; }
        .on { background: #2ecc71; color: white; box-shadow: 0 0 15px #2ecc71; }
        .off { background: #e74c3c; color: white; box-shadow: 0 0 15px #e74c3c; }
    </style>
</head>
<body>
    <h1>Gateway Control</h1>
    <button id="btn" class="btn off" onclick="runAction()">TURN ON</button>
    <p id="status">Ready</p>

    <script>
        let isDeviceOn = false;
        const rinstrumIP = "192.168.2.235"; // CHANGE THIS to your Rinstrum Local IP

        async function runAction() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            const targetState = isDeviceOn ? "Off" : "On";

            status.innerText = "Processing via Rinstrum...";
            
            try {
                // Call Rinstrum Bridge instead of Sinric Directly to avoid CORS
                const response = await fetch(`http://${rinstrumIP}/api/control?state=${targetState}`);
                
                if (response.ok) {
                    isDeviceOn = !isDeviceOn;
                    btn.innerText = `TURN ${isDeviceOn ? 'OFF' : 'ON'}`;
                    btn.className = `btn ${isDeviceOn ? 'on' : 'off'}`;
                    status.innerText = "Command Sent Successfully";
                } else {
                    status.innerText = "Bridge Error - Check Rinstrum Lua";
                }
            } catch (err) {
                status.innerText = "Connection Error - Are you on the same network?";
            }
        }
    </script>
</body>
</html>
